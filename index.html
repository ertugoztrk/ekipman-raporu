<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekipman Kod Raporu - Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--surface:#111827;--border:#1f2d45;--accent:#00d4ff;--text:#e2e8f0;--text-muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{max-width:420px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:50px;box-shadow:0 25px 50px rgba(0,0,0,0.5);position:relative;overflow:hidden;}
.container::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#005cbf,#ffb81c,#005cbf);background-size:200% 100%;animation:gradientShift 3s ease infinite;}
@keyframes gradientShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

.logo{position:relative;display:flex;flex-direction:column;align-items:center;margin-bottom:25px;}
.fbl-logo{width:80px;height:80px;border-radius:50%;border:3px solid rgba(0,92,191,0.3);box-shadow:0 8px 25px rgba(0,92,191,0.2);margin-bottom:10px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 8px 25px rgba(0,92,191,0.2);}50%{transform:scale(1.05);box-shadow:0 12px 35px rgba(0,92,191,0.4);}}

.logo-text{font-size:48px;font-weight:800;text-align:center;background:linear-gradient(135deg,#005cbf,#ffb81c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0;line-height:1;}
.logo-subtitle{font-size:14px;color:#ffb81c;font-weight:600;margin-top:5px;letter-spacing:2px;}

h1{font-size:28px;text-align:center;margin-bottom:10px;color:var(--text);}
.subtitle{text-align:center;color:var(--text-muted);font-size:15px;margin-bottom:35px;}
.input-group{position:relative;margin-bottom:25px;}
.input-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:20px;}
input{width:100%;padding:16px 18px 16px 55px;border:2px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);font-size:16px;font-family:'JetBrains Mono',monospace;transition:all 0.3s;}
input:focus{outline:none;border-color:#ffb81c;box-shadow:0 0 0 4px rgba(255,184,28,0.2);}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,#005cbf,#ffb81c);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent, rgba(255,255,255,0.3),transparent);transition:left 0.5s;}
.btn:hover{background:linear-gradient(135deg,#004a99,#e6a700);transform:translateY(-2px);}
.btn:hover::before{left:100%;}
.error{color:#ff6b6b;font-size:14px;margin-top:15px;text-align:center;padding:10px;background:rgba(255,107,107,0.1);border-radius:8px;border-left:4px solid #ff6b6b;display:none;}
.success{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#005cbf,#ffb81c);color:white;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;text-align:center;padding:20px;display:none;flex-direction:column;}
.success div{max-width:500px;}
.loading{display:inline-block;width:24px;height:24px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 1s ease-in-out infinite;margin-left:15px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:480px){.container{padding:40px 25px;margin:20px;border-radius:16px;}.fbl-logo{width:70px;height:70px;}.logo-text{font-size:42px;}}
</style>
</head>
<body>
<div class="container" id="loginForm">
<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/tr/1/12/Fenerbah%C3%A7e_Spor_Kul%C3%BCb%C3%BC_%282023%29.png" alt="Fenerbahçe SK" class="fbl-logo" onerror="this.src='https://via.placeholder.com/80/005cbf/ffffff?text=FB'">
<div class="logo-text">FENERBAHÇE</div>
<div class="logo-subtitle">SK</div>
</div>
<h1>Ekipman Raporu</h1>
<p class="subtitle">Erişim için parola gerekli</p>

<div class="input-group">
<span class="input-icon">🔑</span>
<input type="password" id="parolaInput" placeholder="Parola girin..." autocomplete="off">
</div>

<button class="btn" onclick="parolaKontrol()">Giriş Yap</button>
<div class="error" id="errorMsg">❌ Yanlış parola! Tekrar deneyin.</div>
</div>

<div class="success" id="successPage">
<div>
<div style="font-size:36px;margin-bottom:20px;">✅ Giriş Başarılı!</div>
<div>Rapor yükleniyor</div>
<div class="loading"></div>
</div>
</div>

<script>
// 🔥 PAROLAYI BURADA DEĞİŞTİRİN!
const DOGRU_PAROLA = "1907";  // ← YENİ PAROLA YAZIN: "sirket2024"

function parolaKontrol() {
  var parola = document.getElementById('parolaInput').value;
  var errorMsg = document.getElementById('errorMsg');
  var loginForm = document.getElementById('loginForm');
  var successPage = document.getElementById('successPage');
  
  if(parola == DOGRU_PAROLA) {
    // ✅ Başarılı
    loginForm.style.display = 'none';
    successPage.style.display = 'flex';
    
    // 2 saniye sonra ANA RAPORA git
    setTimeout(function(){
      window.location.href = 'ekipman_raporu.html';
    }, 2000);
    
  } else {
    // ❌ Hatalı
    errorMsg.style.display = 'block';
    document.getElementById('parolaInput').value = '';
    setTimeout(function(){
      errorMsg.style.display = 'none';
    }, 3000);
  }
}

// Enter tuşu ile giriş
document.getElementById('parolaInput').addEventListener('keypress', function(e) {
  if(e.key === 'Enter') parolaKontrol();
});
</script>
</body>
</html>
