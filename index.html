<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solid Üretim Ekipman, Elek ve IBC Raporu - Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@500;650;750;800&display=swap" rel="stylesheet">
<style>
:root{
  --bilim-blue:#003DA5;
  --bilim-blue-2:#0A5DA8;
  --bg:#061225;
  --surface:#0c213b;
  --surface2:#173a63;
  --border:#4f7eb8;
  --accent:#66bdff;
  --accent-rgb:102,189,255;
  --accent2:#43a9ff;
  --accent3:#9ed4ff;
  --text:#f7fbff;
  --text-muted:#e3f1ff;
  --danger:#ff7b7b;
  --success:#45d98b;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter','Segoe UI',Arial,sans-serif;
}
body.light-mode{
  --bg:#f5f9ff;
  --surface:#ffffff;
  --surface2:#eaf3ff;
  --border:#a9c4e5;
  --accent:var(--bilim-blue);
  --accent-rgb:0,61,165;
  --accent2:#0A5DA8;
  --accent3:#4d8ed0;
  --text:#0b1d34;
  --text-muted:#3c536d;
  --danger:#b42318;
  --success:#05603a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:radial-gradient(circle at 18% 12%,rgba(var(--accent-rgb),.22),transparent 34%),linear-gradient(135deg,#061225 0%,#0d2c52 56%,#07172b 100%);
  color:var(--text);
  font-family:var(--sans);
  overflow:hidden;
}
body.light-mode{
  background:radial-gradient(circle at 18% 12%,rgba(0,61,165,.13),transparent 34%),linear-gradient(135deg,#ffffff 0%,#e9f3ff 100%);
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.18;
  pointer-events:none;
}
body::after{
  content:'';
  position:fixed;
  top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--bilim-blue),var(--accent),var(--bilim-blue-2));
  background-size:200% 100%;
  animation:gradientShift 4s ease infinite;
}
@keyframes gradientShift{0%,100%{background-position:0 50%;}50%{background-position:100% 50%;}}
.login-shell{width:min(520px,100%);position:relative;z-index:1;}
.theme-row{display:flex;justify-content:flex-end;margin-bottom:14px;}
.theme-toggle{
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text-muted);
  font-family:var(--mono);
  font-size:12px;
  font-weight:700;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  transition:all .2s;
}
.theme-toggle:hover{background:var(--surface2);color:var(--accent);border-color:var(--accent);}
.container{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:22px;
  padding:48px 44px 26px;
  box-shadow:0 24px 70px rgba(0,25,70,.44);
  position:relative;
  overflow:hidden;
}
body.light-mode .container{box-shadow:0 18px 50px rgba(0,61,165,.14);}
.container::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--bilim-blue),var(--accent2));}
.logo-area{text-align:center;margin-bottom:30px;}
.brand-mark{
  width:74px;height:74px;margin:0 auto 18px;
  border-radius:18px;
  border:1px solid rgba(var(--accent-rgb),.48);
  background:linear-gradient(135deg,rgba(var(--accent-rgb),.15),rgba(var(--accent-rgb),.04));
  display:flex;align-items:center;justify-content:center;
  color:var(--accent3);
  font-family:var(--mono);
  font-size:28px;
  font-weight:800;
  box-shadow:0 12px 32px rgba(var(--accent-rgb),.16);
}
body.light-mode .brand-mark{color:var(--bilim-blue);}

.brand-logo{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0 auto 18px;
}
.brand-logo svg{
  width:210px;
  height:auto;
  max-height:96px;
  overflow:visible;
  filter:drop-shadow(0 10px 22px rgba(var(--accent-rgb),.18));
}
.brand-logo svg path,
.brand-logo svg g{
  fill:var(--accent3) !important;
}
body.light-mode .brand-logo svg{
  filter:drop-shadow(0 6px 14px rgba(0,61,165,.12));
}
body.light-mode .brand-logo svg path,
body.light-mode .brand-logo svg g{
  fill:var(--bilim-blue) !important;
}

.header-tag{
  font-family:var(--mono);
  font-size:11px;
  color:var(--accent3);
  letter-spacing:2.2px;
  text-transform:uppercase;
  margin-bottom:12px;
  font-weight:700;
}
body.light-mode 
.brand-logo{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0 auto 18px;
}
.brand-logo svg{
  width:210px;
  height:auto;
  max-height:96px;
  overflow:visible;
  filter:drop-shadow(0 10px 22px rgba(var(--accent-rgb),.18));
}
.brand-logo svg path,
.brand-logo svg g{
  fill:var(--accent3) !important;
}
body.light-mode .brand-logo svg{
  filter:drop-shadow(0 6px 14px rgba(0,61,165,.12));
}
body.light-mode .brand-logo svg path,
body.light-mode .brand-logo svg g{
  fill:var(--bilim-blue) !important;
}

.header-tag{color:var(--bilim-blue);}
h1{font-size:clamp(24px,5vw,32px);line-height:1.15;font-weight:800;letter-spacing:-.6px;color:var(--text);margin-bottom:12px;}
.subtitle{text-align:center;color:var(--text-muted);font-family:var(--mono);font-size:13px;line-height:1.5;margin-bottom:32px;}
.input-group{position:relative;margin-bottom:22px;}
.input-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:21px;color:var(--text-muted);}
input{
  width:100%;
  padding:17px 18px 17px 58px;
  border:1px solid var(--border);
  border-radius:13px;
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:16px;
  transition:all .22s;
}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(var(--accent-rgb),.14);}
input::placeholder{color:var(--text-muted);opacity:.74;}
.btn{
  width:100%;
  padding:17px;
  border:none;
  border-radius:13px;
  background:linear-gradient(135deg,var(--bilim-blue),var(--bilim-blue-2));
  color:#fff;
  font-family:var(--mono);
  font-size:15px;
  font-weight:800;
  letter-spacing:.4px;
  cursor:pointer;
  transition:all .22s;
  box-shadow:0 10px 28px rgba(0,61,165,.32);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(0,61,165,.42);filter:brightness(1.08);}
.error{
  display:none;
  margin-top:18px;
  padding:12px 14px;
  border-radius:10px;
  border-left:4px solid var(--danger);
  background:rgba(255,123,123,.11);
  color:var(--danger);
  font-family:var(--mono);
  font-size:13px;
  text-align:center;
}
.signature{
  margin-top:34px;
  padding-top:20px;
  border-top:1px solid var(--border);
  color:var(--text-muted);
  font-family:var(--mono);
  font-size:12px;
  text-align:center;
}
.signature strong{color:var(--accent3);}
body.light-mode .signature strong{color:var(--bilim-blue);}
.success{
  position:fixed;inset:0;z-index:10;
  display:none;align-items:center;justify-content:center;flex-direction:column;
  background:linear-gradient(135deg,#061225 0%,#0d2c52 55%,#07172b 100%);
  color:#fff;text-align:center;padding:24px;font-family:var(--sans);
}
body.light-mode .success{background:linear-gradient(135deg,#ffffff 0%,#e9f3ff 100%);color:#0b1d34;}
.success-card{border:1px solid var(--border);border-radius:20px;background:rgba(12,33,59,.82);padding:38px 42px;box-shadow:0 24px 70px rgba(0,25,70,.35);}
body.light-mode .success-card{background:rgba(255,255,255,.88);}
.success-title{font-size:30px;font-weight:800;margin-bottom:12px;}
.success-text{font-family:var(--mono);color:var(--text-muted);font-size:14px;margin-bottom:20px;}
.loading{display:inline-block;width:30px;height:30px;border:4px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:var(--accent);animation:spin 1s linear infinite;}
body.light-mode .loading{border-color:rgba(0,61,165,.18);border-top-color:var(--bilim-blue);}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:520px){
  body{padding:18px;overflow:auto;}
  .container{padding:42px 26px 24px;border-radius:18px;}
  .brand-mark{width:66px;height:66px;font-size:24px;}
}
</style>
</head>

      <h1>Solid Üretim Ekipman, Elek ve IBC Raporu</h1>
      <p class="subtitle">Raporu görüntülemek için parola gerekli</p>
    </div>

    <div class="input-group">
      <span class="input-icon">🔑</span>
      <input type="password" id="parolaInput" placeholder="Parola girin..." autocomplete="off" autofocus>
    </div>

    <button class="btn" onclick="parolaKontrol()">Giriş Yap</button>
    <div class="error" id="errorMsg">❌ Yanlış parola! Tekrar deneyin.</div>

    <div class="signature">
      <strong>Ertuğrul Öztürk</strong> tarafından hazırlanmıştır.
    </div>
  </div>
</div>

<div class="success" id="successPage">
  <div class="success-card">
    <div class="success-title">✅ Giriş Başarılı</div>
    <div class="success-text">Rapor yükleniyor</div>
    <div class="loading"></div>
  </div>
</div>

<script>
const DOGRU_PAROLA = "Bilim";
const RAPOR_DOSYASI = "ekipman_elek_ibc_raporu.html";

function temaDegistir(){
  document.body.classList.toggle('light-mode');
  const light = document.body.classList.contains('light-mode');
  localStorage.setItem('girisTema', light ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = light ? '🌙 Koyu Mod' : '☀️ Açık Mod';
}

(function temaYukle(){
  const kayitliTema = localStorage.getItem('girisTema');
  if(kayitliTema === 'light') document.body.classList.add('light-mode');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('light-mode') ? '🌙 Koyu Mod' : '☀️ Açık Mod';
})();

function parolaKontrol(){
  const parola = document.getElementById('parolaInput').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const loginForm = document.getElementById('loginForm');
  const successPage = document.getElementById('successPage');

  if(parola === DOGRU_PAROLA){
    loginForm.style.display = 'none';
    document.querySelector('.theme-row').style.display = 'none';
    successPage.style.display = 'flex';
    setTimeout(function(){
      window.location.href = RAPOR_DOSYASI;
    }, 900);
  }else{
    errorMsg.style.display = 'block';
    document.getElementById('parolaInput').value = '';
    document.getElementById('parolaInput').focus();
    setTimeout(function(){ errorMsg.style.display = 'none'; }, 3000);
  }
}

document.getElementById('parolaInput').addEventListener('keypress', function(e){
  if(e.key === 'Enter') parolaKontrol();
});
</script>
